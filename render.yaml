services:
  - type: web
    name: workflowpro
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev
      - key: MAIL_ENABLED
        value: false
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=75.0
      - key: JWT_SECRET
        sync: false
