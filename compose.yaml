services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-workflowpro}
      MYSQL_USER: ${MYSQL_USER:-workflowpro}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-workflowpro}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-workflowpro}?createDatabaseIfNotExist=true&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-workflowpro}
      DB_PASSWORD: ${MYSQL_PASSWORD:-workflowpro}
      JWT_SECRET: ${JWT_SECRET:-V29ya0Zsb3dQcm9EZXZlbG9wbWVudFNlY3JldEtleUZvckpXVFRva2Vucw==}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
